<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capture OS | 控制台</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #e0e0e0;
        }

        .container {
            width: 100%;
            max-width: 440px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px 32px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-2px);
        }

        .logo {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .logo svg {
            width: 28px;
            height: 28px;
            color: white;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 4px;
            color: #fff;
        }

        .subtitle {
            text-align: center;
            font-size: 13px;
            color: #888;
            margin-bottom: 28px;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 14px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: all 0.3s;
            font-family: 'Inter', monospace;
        }

        input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }

        input::placeholder {
            color: #555;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 12px;
            font-family: 'Inter', sans-serif;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-outline {
            background: transparent;
            color: #888;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 13px;
            margin-top: 8px;
        }

        .btn-outline:hover {
            color: #fff;
            border-color: rgba(255, 255, 255, 0.25);
        }

        .btn-notion {
            background: #fff;
            color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-notion:hover {
            background: #f0f0f0;
        }

        .error-msg {
            color: #f87171;
            font-size: 13px;
            text-align: center;
            margin-top: 10px;
            display: none;
        }

        /* ===== Dashboard ===== */
        .dashboard {
            display: none;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 20px 0;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 16px;
            text-align: center;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #fff;
            line-height: 1.2;
        }

        .stat-label {
            font-size: 11px;
            color: #666;
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 3px;
            margin: 16px 0 6px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #6366f1, #8b5cf6);
            border-radius: 3px;
            transition: width 0.6s ease;
        }

        .progress-text {
            font-size: 12px;
            color: #888;
            display: flex;
            justify-content: space-between;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 14px;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            color: #888;
        }

        .info-value {
            color: #fff;
            font-weight: 500;
        }

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-active {
            background: rgba(34, 197, 94, 0.15);
            color: #4ade80;
        }

        .badge-admin {
            background: rgba(250, 204, 21, 0.15);
            color: #facc15;
        }

        .badge-normal {
            background: rgba(99, 102, 241, 0.15);
            color: #818cf8;
        }

        .badge-unbound {
            background: rgba(248, 113, 113, 0.15);
            color: #f87171;
        }

        .badge-bound {
            background: rgba(34, 197, 94, 0.15);
            color: #4ade80;
        }

        .section-title {
            font-size: 11px;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 20px 0 8px;
        }

        .footer {
            text-align: center;
            font-size: 11px;
            color: #444;
            margin-top: 16px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            animation: fadeIn 0.4s ease;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            display: inline-block;
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- ===== 登录卡片 ===== -->
        <div id="loginView" class="card">
            <div class="logo">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M13 10V3L4 14h7v7l9-11h-7z" />
                </svg>
            </div>
            <h1>Capture OS</h1>
            <p class="subtitle">连接您的第二大脑，从这里开始</p>

            <input type="text" id="keyInput" placeholder="输入您的 License Key" autocomplete="off">
            <button class="btn btn-primary" id="loginBtn" onclick="handleLogin()">
                <span id="loginText">验证密钥</span>
                <span id="loginSpinner" class="spinner" style="display:none"></span>
            </button>
            <p class="error-msg" id="errorMsg"></p>

            <div class="footer" style="margin-top: 24px;">
                安全连接 · 官方授权 · 隐私保护
            </div>
        </div>

        <!-- ===== 个人面板 ===== -->
        <div id="dashView" class="card dashboard">
            <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom: 4px;">
                <h1 style="text-align:left; font-size: 20px;">Capture OS</h1>
                <span id="roleBadge" class="badge badge-normal">普通用户</span>
            </div>
            <p class="subtitle" style="text-align:left; margin-bottom: 16px;" id="keyDisplay">CAP-XXXX-****</p>

            <!-- 用量统计 -->
            <div class="stat-grid">
                <div class="stat-card">
                    <div class="stat-value" id="usedToday">0</div>
                    <div class="stat-label">今日已用</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="remaining">20</div>
                    <div class="stat-label">今日剩余</div>
                </div>
            </div>

            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
            <div class="progress-text">
                <span id="progressLabel">0 / 20</span>
                <span id="progressPercent">0%</span>
            </div>

            <!-- 账户信息 -->
            <div class="section-title">账户信息</div>
            <div>
                <div class="info-row">
                    <span class="info-label">状态</span>
                    <span class="info-value"><span id="statusBadge" class="badge badge-active">已激活</span></span>
                </div>
                <div class="info-row">
                    <span class="info-label">Notion</span>
                    <span class="info-value" id="notionStatus"><span class="badge badge-unbound">未绑定</span></span>
                </div>
                <div class="info-row">
                    <span class="info-label">注册时间</span>
                    <span class="info-value" id="createdAt">-</span>
                </div>
            </div>

            <!-- Notion 绑定按钮（未绑定时显示） -->
            <div id="bindSection" style="display:none; margin-top: 16px;">
                <button class="btn btn-notion" onclick="bindNotion()">
                    <svg width="18" height="18" viewBox="0 0 100 100" fill="none">
                        <path
                            d="M6.017 4.313l55.333-4.087c6.797-.583 8.543-.19 12.817 2.917l17.663 12.443c2.913 2.14 3.883 2.723 3.883 5.053v68.243c0 4.277-1.553 6.807-6.99 7.193L24.467 99.967c-4.08.193-6.023-.39-8.16-3.113L3.3 79.94c-2.333-3.113-3.3-5.443-3.3-8.167V11.113c0-3.497 1.553-6.413 6.017-6.8z"
                            fill="#fff" />
                        <path fill-rule="evenodd" clip-rule="evenodd"
                            d="M61.35.227L6.017 4.313C1.553 4.7 0 7.617 0 11.113v60.66c0 2.723.967 5.053 3.3 8.167l12.007 16.913c2.137 2.723 4.08 3.307 8.16 3.113l64.257-3.89c5.437-.387 6.99-2.917 6.99-7.193V17.64c0-2.21-.865-2.857-3.45-4.73L73.457 1.14C69.893-.86 68.147-1.01 61.35.227zM25.92 19.523c-5.247.353-6.437.433-9.417-1.99L8.927 11.507c-.777-.583-.387-1.36 1.167-1.553l53.193-3.887c4.467-.39 6.793 1.167 8.543 2.527l9.123 6.61c.39.193 1.36 1.36.193 1.36l-54.87 3.153-.357-.193zM19.803 88.3V30.367c0-2.53.777-3.697 3.103-3.893L86 22.78c2.14-.193 3.107 1.167 3.107 3.693v57.547c0 2.53-1.553 4.277-4.277 4.083L22.523 91.607c-2.723-.193-2.72-1.773-2.72-3.307zM83.507 33.187c.387 1.75 0 3.5-1.75 3.7l-2.527.48v42.767c-2.14 1.167-4.077 1.75-5.833 1.75-2.723 0-3.5-.583-5.437-3.5L49.077 48.437v28.93l5.247 1.167s0 3.5-4.857 3.5l-13.383.777c-.39-.777 0-2.723 1.357-3.11l3.497-.97v-38.3L36.44 40.04c-.387-1.75.583-4.277 3.3-4.473l14.357-.97 19.177 29.3V37.273l-4.277-.48c-.39-2.143 1.163-3.7 3.103-3.893l13.407-.713z"
                            fill="#000" />
                    </svg>
                    连接 Notion
                </button>
            </div>

            <!-- 退出按钮 -->
            <button class="btn btn-outline" onclick="logout()">切换账号</button>

            <div class="footer">
                Capture OS Pro · 安全连接
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'capture_os_license_key';
        let currentKey = '';

        // 页面加载：检查 localStorage
        window.addEventListener('DOMContentLoaded', () => {
            const savedKey = localStorage.getItem(STORAGE_KEY);
            if (savedKey) {
                currentKey = savedKey;
                loadDashboard(savedKey);
            }

            // 回车提交
            document.getElementById('keyInput').addEventListener('keydown', e => {
                if (e.key === 'Enter') handleLogin();
            });
        });

        async function handleLogin() {
            const key = document.getElementById('keyInput').value.trim();
            if (!key) return showError('请输入密钥');

            showLoading(true);
            try {
                const res = await fetch(`/api/usage?key=${encodeURIComponent(key)}`);
                const data = await res.json();

                if (!res.ok) {
                    showError(data.error || '密钥无效');
                    showLoading(false);
                    return;
                }

                // 保存到 localStorage
                localStorage.setItem(STORAGE_KEY, key);
                currentKey = key;

                // 未绑定 Notion → 先跳 OAuth
                if (!data.notion_bound) {
                    window.location.href = `/auth?key=${encodeURIComponent(key)}`;
                    return;
                }

                renderDashboard(data);
            } catch (e) {
                showError('网络错误，请重试');
                showLoading(false);
            }
        }

        async function loadDashboard(key) {
            showLoading(true);
            document.getElementById('loginView').style.display = 'none';

            try {
                const res = await fetch(`/api/usage?key=${encodeURIComponent(key)}`);
                const data = await res.json();

                if (!res.ok) {
                    // 密钥失效，清除缓存，回到登录
                    localStorage.removeItem(STORAGE_KEY);
                    document.getElementById('loginView').style.display = 'block';
                    showLoading(false);
                    return;
                }

                renderDashboard(data);
            } catch (e) {
                // 网络错误，回到登录
                localStorage.removeItem(STORAGE_KEY);
                document.getElementById('loginView').style.display = 'block';
                showLoading(false);
            }
        }

        function renderDashboard(data) {
            document.getElementById('loginView').style.display = 'none';
            const dash = document.getElementById('dashView');
            dash.style.display = 'block';
            dash.classList.add('fade-in');

            // 密钥 & 角色
            document.getElementById('keyDisplay').textContent = data.key;
            const roleBadge = document.getElementById('roleBadge');
            if (data.role === '管理员') {
                roleBadge.textContent = '👑 管理员';
                roleBadge.className = 'badge badge-admin';
            } else {
                roleBadge.textContent = '普通用户';
                roleBadge.className = 'badge badge-normal';
            }

            // 用量
            const used = data.today.used;
            const limit = data.today.limit;
            const isUnlimited = limit === '无限制';

            document.getElementById('usedToday').textContent = used;
            document.getElementById('remaining').textContent = isUnlimited ? '∞' : data.today.remaining;

            if (isUnlimited) {
                document.getElementById('progressFill').style.width = '0%';
                document.getElementById('progressLabel').textContent = `${used} / 无限制`;
                document.getElementById('progressPercent').textContent = '∞';
            } else {
                const pct = Math.min(100, Math.round((used / limit) * 100));
                document.getElementById('progressFill').style.width = pct + '%';
                document.getElementById('progressFill').style.background =
                    pct > 80 ? 'linear-gradient(90deg, #f87171, #ef4444)' : 'linear-gradient(90deg, #6366f1, #8b5cf6)';
                document.getElementById('progressLabel').textContent = `${used} / ${limit}`;
                document.getElementById('progressPercent').textContent = pct + '%';
            }

            // 状态
            const statusBadge = document.getElementById('statusBadge');
            statusBadge.textContent = data.status === 'active' ? '已激活' : data.status;
            statusBadge.className = 'badge ' + (data.status === 'active' ? 'badge-active' : 'badge-unbound');

            // Notion
            const notionEl = document.getElementById('notionStatus');
            if (data.notion_bound) {
                notionEl.innerHTML = '<span class="badge badge-bound">已绑定</span>';
                document.getElementById('bindSection').style.display = 'none';
            } else {
                notionEl.innerHTML = '<span class="badge badge-unbound">未绑定</span>';
                document.getElementById('bindSection').style.display = 'block';
            }

            // 日期
            if (data.created_at) {
                document.getElementById('createdAt').textContent = data.created_at.substring(0, 10);
            }
        }

        function bindNotion() {
            window.location.href = `/auth?key=${encodeURIComponent(currentKey)}`;
        }

        function logout() {
            localStorage.removeItem(STORAGE_KEY);
            currentKey = '';
            document.getElementById('dashView').style.display = 'none';
            document.getElementById('loginView').style.display = 'block';
            document.getElementById('loginView').classList.add('fade-in');
            document.getElementById('keyInput').value = '';
            document.getElementById('errorMsg').style.display = 'none';
            showLoading(false);
        }

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 4000);
        }

        function showLoading(show) {
            document.getElementById('loginText').style.display = show ? 'none' : 'inline';
            document.getElementById('loginSpinner').style.display = show ? 'inline-block' : 'none';
        }
    </script>
</body>

</html>
